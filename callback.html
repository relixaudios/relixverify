<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Relix Audios Verification</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #1b1d22;
      --line: #30343d;
      --text: #f4f7fb;
      --muted: #9ca6b6;
      --blue: #5865f2;
      --green: #33c27f;
      --red: #f25555;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(88, 101, 242, 0.16), transparent 38%),
        linear-gradient(315deg, rgba(51, 194, 127, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 29, 34, 0.94);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .avatar,
    .spinner,
    .badge {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .spinner {
      border: 3px solid rgba(156, 166, 182, 0.25);
      border-top-color: var(--blue);
      animation: spin 0.9s linear infinite;
    }

    .badge {
      display: grid;
      place-items: center;
      background: rgba(51, 194, 127, 0.12);
      border: 1px solid rgba(51, 194, 127, 0.45);
      color: var(--green);
      font-weight: 900;
      font-size: 28px;
    }

    .badge.error {
      background: rgba(242, 85, 85, 0.12);
      border-color: rgba(242, 85, 85, 0.45);
      color: var(--red);
    }

    .avatar {
      object-fit: cover;
      background: #252831;
      border: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 800;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    dl {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 22px 0 0;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    dt {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    dd {
      margin: 4px 0 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      margin-top: 24px;
    }

    a {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 6px;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <main id="app">
    <div class="topline">
      <div class="spinner" aria-hidden="true"></div>
      <div>
        <h1>Verifying account</h1>
        <p>Please keep this page open.</p>
      </div>
    </div>
  </main>

  <script src="./config.js"></script>
  <script>
    const config = window.RELIX_VERIFY_CONFIG || {};
    const app = document.getElementById("app");
    const requiredApiOrigin = "http://217.160.125.128:14254";
    const requiredApiPath = "/api/oauth/callback";

    function cleanUrl() {
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, document.title, window.location.pathname);
      }
    }

    function text(value, fallback) {
      return value ? String(value) : fallback;
    }

    function escapeHtml(value) {
      return text(value, "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function safeUrl(value, fallback) {
      const rawValue = text(value, fallback);
      try {
        const url = new URL(rawValue, window.location.href);
        if (url.protocol === "https:" || url.protocol === "http:") {
          return url.href;
        }
      } catch (err) {
        return fallback;
      }

      return fallback;
    }

    function isConfiguredApiUrl(apiUrl) {
      try {
        const url = new URL(apiUrl);
        return url.origin === requiredApiOrigin && url.pathname === requiredApiPath;
      } catch (err) {
        return false;
      }
    }

    function resolveApiEndpoints() {
      const targets = config.apiTargets || {};
      const endpoint = targets.server || {};
      const apiUrl = typeof endpoint === "string" ? endpoint : endpoint && endpoint.apiUrl;
      const configuredApiUrl = isConfiguredApiUrl(apiUrl) ? apiUrl : config.apiUrl;

      if (!isConfiguredApiUrl(configuredApiUrl)) {
        return [];
      }

      return [{
        name: "server",
        label: endpoint.label || "Server",
        url: configuredApiUrl
      }];
    }

    function isRetryableVerificationFailure(error, response, payload) {
      if (error) {
        return true;
      }

      const status = response && response.status;
      const message = text(payload && payload.message, "").toLowerCase();

      if ([408, 502, 503, 504].includes(status)) {
        return true;
      }

      if (message.includes("backend") || message.includes("not reachable") || message.includes("returned")) {
        return true;
      }

      if (status === 403 && (!message || message.includes("origin") || message.includes("forbidden"))) {
        return true;
      }

      return false;
    }

    async function fetchVerification(endpoint, code, state) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), 8000);

      try {
        const response = await fetch(endpoint.url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ code, state }),
          signal: controller.signal
        });
        const payload = await response.json().catch(() => ({}));
        return { response, payload };
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    function renderError(message) {
      const returnUrl = safeUrl(config.discordUrl, "https://discord.gg/s5qHTezSMU");
      app.innerHTML = `
        <div class="topline">
          <div class="badge error" aria-hidden="true">!</div>
          <div>
            <h1>Verification failed</h1>
            <p>${escapeHtml(text(message, "Please try the verification link again."))}</p>
          </div>
        </div>
        <div class="actions">
          <a href="${returnUrl}">Return to Discord</a>
        </div>
      `;
    }

    function renderSuccess(payload) {
      const user = payload.user || {};
      const avatar = safeUrl(user.avatar_url, "");
      const returnUrl = safeUrl(payload.return_url, safeUrl(config.discordUrl, "https://discord.gg/s5qHTezSMU"));
      app.innerHTML = `
        <div class="topline">
          ${avatar ? `<img class="avatar" alt="" src="${avatar}">` : `<div class="badge" aria-hidden="true">OK</div>`}
          <div>
            <h1>Verification complete</h1>
            <p>${escapeHtml(text(user.display_name, "Your account"))} is now verified.</p>
          </div>
        </div>
        <dl>
          <div>
            <dt>Username</dt>
            <dd>@${escapeHtml(text(user.username, "Unknown"))}</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd>Verified</dd>
          </div>
          <div>
            <dt>Joined</dt>
            <dd>${escapeHtml(text(user.joined_at, "Unknown"))}</dd>
          </div>
          <div>
            <dt>Created</dt>
            <dd>${escapeHtml(text(user.created_at, "Unknown"))}</dd>
          </div>
        </dl>
        <div class="actions">
          <a href="${returnUrl}">Return to Discord</a>
        </div>
      `;

      window.setTimeout(() => {
        window.location.replace(returnUrl);
      }, 6000);
    }

    async function completeVerification() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const state = params.get("state");
      const error = params.get("error");
      const apiEndpoints = resolveApiEndpoints();

      cleanUrl();

      if (!apiEndpoints.length) {
        renderError("Verification endpoint is not configured.");
        return;
      }

      if (error) {
        renderError("Authorization was denied.");
        return;
      }

      if (!code || !state) {
        renderError("Missing OAuth response.");
        return;
      }

      let lastErrorMessage = "Verification endpoint is not reachable.";

      for (const endpoint of apiEndpoints) {
        try {
          const { response, payload } = await fetchVerification(endpoint, code, state);

          if (response.ok && payload.ok) {
            renderSuccess(payload);
            return;
          }

          lastErrorMessage = payload.message || `Verification failed through ${endpoint.label}.`;

          if (isRetryableVerificationFailure(null, response, payload)) {
            continue;
          }

          renderError(lastErrorMessage);
          return;
        } catch (err) {
          lastErrorMessage = err.name === "AbortError"
            ? `${endpoint.label} timed out.`
            : text(err.message, `${endpoint.label} is not reachable.`);

          if (isRetryableVerificationFailure(err)) {
            continue;
          }

          renderError(lastErrorMessage);
          return;
        }
      }

      renderError(lastErrorMessage);
    }

    completeVerification();
  </script>
</body>
</html>
