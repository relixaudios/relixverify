<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relix Audios Verification</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #1b1d22;
      --line: #30343d;
      --text: #f4f7fb;
      --muted: #9ca6b6;
      --blue: #5865f2;
      --green: #33c27f;
      --red: #f25555;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(88, 101, 242, 0.16), transparent 38%),
        linear-gradient(315deg, rgba(51, 194, 127, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 29, 34, 0.92);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 800;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    label {
      display: block;
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 44px;
      margin-top: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #14161b;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.18);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--green);
      font-weight: 700;
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 18px rgba(51, 194, 127, 0.7);
    }

    .api-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #14161b;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.active {
      border-color: var(--blue);
      background: rgba(88, 101, 242, 0.18);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .primary-button {
      width: 100%;
      margin-top: 14px;
      background: var(--blue);
      border-color: var(--blue);
    }

    .error {
      min-height: 20px;
      margin-top: 10px;
      color: var(--red);
      font-size: 13px;
      font-weight: 700;
    }

    .endpoint {
      margin-top: 10px;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .page-link {
      display: inline-flex;
      margin-top: 16px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .page-link:hover {
      color: var(--green);
    }
  </style>
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <main id="login-panel">
    <div class="mark">RA</div>
    <h1>Admin Access</h1>
    <p>Enter the admin password to manage Relix Audios verification.</p>
    <form id="admin-login">
      <label for="admin-password">Password</label>
      <input id="admin-password" type="password" autocomplete="current-password" autofocus>
      <button class="primary-button" type="submit">Unlock</button>
      <p class="error" id="auth-error" aria-live="polite"></p>
    </form>
  </main>

  <main id="admin-panel" hidden>
    <div class="mark">RA</div>
    <h1>Relix Audios Verification</h1>
    <p>Secure Discord verification is active for Relix Audios.</p>
    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      Ready
    </div>
    <div class="api-switch" aria-label="API target">
      <button type="button" data-api-target="server">Server</button>
    </div>
    <p class="endpoint" id="endpoint"></p>
    <a class="page-link" href="./verification.html">Open public verification page</a>
  </main>

  <script src="./config.js"></script>
  <script>
    const config = window.RELIX_VERIFY_CONFIG || {};
    const adminPassword = "ruhi123";
    const adminAuthKey = "relixVerifyAdminUnlocked";
    const storageKey = "relixVerifyApiTarget";
    const loginPanel = document.getElementById("login-panel");
    const adminPanel = document.getElementById("admin-panel");
    const loginForm = document.getElementById("admin-login");
    const passwordInput = document.getElementById("admin-password");
    const authError = document.getElementById("auth-error");
    const buttons = Array.from(document.querySelectorAll("[data-api-target]"));
    const endpoint = document.getElementById("endpoint");

    function getTargets() {
      return config.apiTargets || {};
    }

    function isConfiguredApiUrl(apiUrl) {
      return Boolean(apiUrl && !apiUrl.includes("YOUR-"));
    }

    function getStoredTarget() {
      try {
        return window.localStorage.getItem(storageKey);
      } catch (err) {
        return "";
      }
    }

    function setStoredTarget(target) {
      try {
        window.localStorage.setItem(storageKey, target);
      } catch (err) {
        return;
      }
    }

    function isAdminUnlocked() {
      try {
        return window.sessionStorage.getItem(adminAuthKey) === "1";
      } catch (err) {
        return false;
      }
    }

    function storeAdminUnlock() {
      try {
        window.sessionStorage.setItem(adminAuthKey, "1");
      } catch (err) {
        return;
      }
    }

    function showAdminPanel() {
      loginPanel.hidden = true;
      adminPanel.hidden = false;
    }

    function renderTarget(target) {
      const targets = getTargets();
      const fallbackTargets = [target, config.defaultApiTarget, "server"];
      const selected = fallbackTargets.find((candidate) => {
        const targetConfig = targets[candidate] || {};
        return isConfiguredApiUrl(targetConfig.apiUrl);
      }) || "server";
      const targetConfig = targets[selected] || {};

      buttons.forEach((button) => {
        const buttonConfig = targets[button.dataset.apiTarget] || {};
        button.disabled = !isConfiguredApiUrl(buttonConfig.apiUrl);
        button.classList.toggle("active", button.dataset.apiTarget === selected);
      });

      endpoint.textContent = targetConfig.apiUrl || "";
    }

    const initialTarget = getStoredTarget() || config.defaultApiTarget || "server";
    renderTarget(initialTarget);

    if (isAdminUnlocked()) {
      showAdminPanel();
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();

      if (passwordInput.value === adminPassword) {
        storeAdminUnlock();
        authError.textContent = "";
        passwordInput.value = "";
        showAdminPanel();
        return;
      }

      authError.textContent = "Wrong password.";
      passwordInput.select();
    });

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const target = button.dataset.apiTarget;
        setStoredTarget(target);
        renderTarget(target);
      });
    });
  </script>
</body>
</html>
