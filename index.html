<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relix Audios Verification</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #1b1d22;
      --line: #30343d;
      --text: #f4f7fb;
      --muted: #9ca6b6;
      --blue: #5865f2;
      --green: #33c27f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(88, 101, 242, 0.16), transparent 38%),
        linear-gradient(315deg, rgba(51, 194, 127, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 29, 34, 0.92);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 800;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--green);
      font-weight: 700;
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 18px rgba(51, 194, 127, 0.7);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">RA</div>
    <h1>Relix Audios Verification</h1>
    <p>Secure Discord verification is active for Relix Audios.</p>
    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      Ready
    </div>
  </main>
</body>
</html>
